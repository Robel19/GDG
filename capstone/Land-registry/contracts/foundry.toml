[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = false
fuzz            = { runs = 256 }
# Default for `forge script` / `cast` when `--rpc-url` is omitted (Base Sepolia testnet).
eth_rpc_url     = "https://sepolia.base.org"

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
base_mainnet = "${BASE_MAINNET_RPC}"
localhost    = "http://127.0.0.1:8545"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }

[fmt]
line_length    = 100
tab_width      = 4
bracket_spacing = true
